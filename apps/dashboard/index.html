<!doctype html>
<html lang="en" data-theme="terminal">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClawQuest Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <meta name="description" content="Paid Distribution for AI Skills — Verified Onchain" />
    <meta name="theme-color" content="#232629" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  </head>
  <body>
    <script>
      // Restore theme before first paint to prevent FOUC
      (function() {
        var t = localStorage.getItem('cq-theme') || 'terminal';
        var m = localStorage.getItem('cq-color-mode') || 'light';
        document.documentElement.setAttribute('data-theme', t);
        if (m === 'dark' || (m === 'system' && matchMedia('(prefers-color-scheme:dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
